# Project-wide Gradle settings

# Memory for Gradle daemon
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# Execution strategy - prevents "Could not connect to Kotlin compile daemon"
kotlin.compiler.execution.strategy=in-process

# ??? CRITICAL: These two lines fix the AndroidX error ???????????????????????
android.useAndroidX=true
android.enableJetifier=true
# ????????????????????????????????????????????????????????????????????????????

# Performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true

# KSP incremental compilation (faster rebuilds after first build)
ksp.incremental=true
ksp.incremental.intermodule=true

# Kotlin code style
kotlin.code.style=official

# Reduces R class size
android.nonTransitiveRClass=true
org.gradle.configuration-cache=true